services:

  mongodb:
    image: mongo:7
    container_name: auction_mongodb
    command: ["--replSet", "rs0", "--bind_ip_all", "--port", "27017"]

    ports:
      - "27018:27017"

    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:7-alpine
    container_name: auction_redis

    ports:
      - "6385:6379"

    # Add --bind 0.0.0.0 before the password flag
    command: redis-server --bind 0.0.0.0 --requirepass auctionbidding

volumes:
  mongo_data:

